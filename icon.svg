<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <!-- Main gradient: violet → blue -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>
    <!-- Inner top-left highlight -->
    <radialGradient id="shine" cx="30%" cy="25%" r="55%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <!-- Soft glow filter for the shape -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- Background rounded square -->
  <rect width="100" height="100" rx="22" ry="22" fill="url(#bg)"/>
  <!-- Gloss overlay -->
  <rect width="100" height="100" rx="22" ry="22" fill="url(#shine)"/>

  <!-- Magnifying glass circle -->
  <circle cx="43" cy="43" r="21" fill="none" stroke="white" stroke-width="7"
          stroke-linecap="round" opacity="0.95" filter="url(#glow)"/>

  <!-- Checkmark inside the magnifier lens -->
  <path d="M33 43 L40 51 L55 33"
        fill="none" stroke="white" stroke-width="6.5"
        stroke-linecap="round" stroke-linejoin="round" opacity="0.95"/>

  <!-- Magnifying glass handle -->
  <line x1="59" y1="59" x2="75" y2="76"
        stroke="white" stroke-width="7.5" stroke-linecap="round" opacity="0.95"/>
</svg>
